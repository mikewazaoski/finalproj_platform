server {
    listen 80;
    server_name localhost;
    root /app/public;

    # Correctly handle the front controller (Symfony's public/index.php)
    location / {
        # try to serve file directly, fallback to index.php
        try_files $uri /index.php$is_args$args;
    }

    # Pass PHP scripts to the PHP-FPM container process
    location ~ ^/index\.php(/|$) {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;

        # Tell Symfony it's running behind Nginx
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        
        internal;
    }

    # Return 404 for all other php files to prevent executing malicious code
    location ~ \.php$ {
        return 404;
    }

    # Optimize caching for static assets (CSS, JS, Images)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
        log_not_found off;
        access_log off;
    }

    error_log /var/log/nginx/project_error.log;
    access_log /var/log/nginx/project_access.log;
}